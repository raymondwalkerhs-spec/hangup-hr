# Optional CI release — does NOT replace your local installer builds.
# Windows: installer/portable still built on your PC via scripts/build.ps1
# This workflow publishes GitHub Release patch/full zips for in-app updates.
#
# Required: either SERVICE_ACCOUNT_JSON (full .env file text) OR individual SUPABASE_* + SESSION_SECRET secrets
# Optional: CSC_LINK, CSC_KEY_PASSWORD (Windows code signing)

name: Release (update packages)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.9-beta.1). Leave empty to use package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: meta
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              TAG="${{ github.ref_name }}"
            else
              TAG="v${PKG_VERSION}"
            fi
          fi
          case "$TAG" in v*) ;; *) TAG="v${TAG}" ;; esac
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: resolve-tag
    # windows-latest may ship VS 2026 (v18) before node-gyp supports it; 2022 image is stable for native rebuilds.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare build environment
        shell: pwsh
        env:
          ENV_FILE_SECRET: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          New-Item -ItemType Directory -Force -Path credentials | Out-Null
          '{}' | Set-Content credentials/service-account.json
          if ($env:ENV_FILE_SECRET) {
            Set-Content -Path .env -Value $env:ENV_FILE_SECRET -NoNewline
            Add-Content -Path .env -Value "`nGITHUB_UPDATES_REPO=${{ github.repository }}"
          } else {
            if (-not $env:SESSION_SECRET) { $env:SESSION_SECRET = "ci-release-placeholder-change-in-prod" }
            @"
          DATA_BACKEND=supabase
          SUPABASE_URL=$env:SUPABASE_URL
          SUPABASE_SECRET_KEY=$env:SUPABASE_SECRET_KEY
          SUPABASE_PUBLISHABLE_KEY=$env:SUPABASE_PUBLISHABLE_KEY
          SESSION_SECRET=$env:SESSION_SECRET
          GITHUB_UPDATES_REPO=${{ github.repository }}
          "@ | Set-Content .env
          }

      - run: npm ci --ignore-scripts
      - name: Rebuild native modules (Windows)
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_build_from_source: "false"

      - name: Fetch previous release manifests
        run: node scripts/fetch-all-release-manifests.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_UPDATES_REPO: ${{ github.repository }}

      - name: Build NSIS installer + unpacked
        shell: pwsh
        env:
          CI: "true"
          SKIP_CREDENTIALS_CHECK: "1"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: .\scripts\build.ps1 installer

      - name: Package Windows update zips
        run: node scripts/package-github-release.js --full

      - name: Require patch zip when prior manifest exists
        shell: pwsh
        run: |
          $manifestDir = "dist/update-manifests"
          $prior = @(Get-ChildItem $manifestDir -Filter "win-x64-*.json" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch '-latest\.json$' })
          if ($prior.Count -eq 0) {
            Write-Host "No prior win-x64 manifest — patch zip optional (first release)."
            exit 0
          }
          $patches = @(Get-ChildItem dist -Filter "Hangup-Portal-*-win-x64-patch-*.zip" -ErrorAction SilentlyContinue)
          if (-not $patches.Count) {
            throw "Patch zip required: prior manifest exists but no Hangup-Portal-*-win-x64-patch-*.zip was built."
          }
          Write-Host "Patch zips OK: $($patches.Name -join ', ')"

      - name: Verify Windows update packages
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter "Hangup-Portal-*-win-x64*.zip" -ErrorAction SilentlyContinue | ForEach-Object {
            node scripts/verify-update-package.js $_.FullName
          }
          Get-ChildItem dist -Filter "Hangup-HR-*-win-x64*.zip" -ErrorAction SilentlyContinue | ForEach-Object {
            node scripts/verify-update-package.js $_.FullName
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/Hangup-Portal-*-win-x64*.zip
            dist/Hangup-HR-*-win-x64*.zip
            dist/update-manifests/win-x64-latest.json
            dist/*Setup*.exe
          if-no-files-found: error

  build-macos:
    needs: resolve-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare build environment
        env:
          ENV_FILE_SECRET: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          mkdir -p credentials
          echo '{}' > credentials/service-account.json
          if [ -n "$ENV_FILE_SECRET" ]; then
            printf '%s\n' "$ENV_FILE_SECRET" > .env
            echo "GITHUB_UPDATES_REPO=${{ github.repository }}" >> .env
          else
            if [ -z "$SESSION_SECRET" ]; then SESSION_SECRET="ci-release-placeholder-change-in-prod"; fi
            cat > .env <<EOF
          DATA_BACKEND=supabase
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY
          SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY
          SESSION_SECRET=$SESSION_SECRET
          GITHUB_UPDATES_REPO=${{ github.repository }}
          EOF
          fi

      - run: npm ci --ignore-scripts
      - run: npm run rebuild:native

      - name: Fetch previous release manifests
        run: node scripts/fetch-all-release-manifests.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_UPDATES_REPO: ${{ github.repository }}

      - name: Build macOS dmg + zip
        env:
          CI: "true"
          SKIP_CREDENTIALS_CHECK: "1"
        run: bash scripts/build-macos.sh

      - name: Package macOS update zips
        run: node scripts/package-github-release.js --full

      - name: Verify macOS update packages
        run: |
          find dist \( -name 'Hangup-Portal-*-mac-*.zip' -o -name 'Hangup-HR-*-mac-*.zip' \) -print | while read -r z; do
            node scripts/verify-update-package.js "$z"
          done

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/Hangup-Portal-*-mac-*.zip
            dist/Hangup-HR-*-mac-*.zip
            dist/update-manifests/mac-*-latest.json
            dist/*.dmg
          if-no-files-found: warn

  publish:
    needs: [resolve-tag, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets
          continue-on-error: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: Hangup Portal ${{ needs.resolve-tag.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: true
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
