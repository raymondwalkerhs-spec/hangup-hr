# Optional CI release — does NOT replace your local installer builds.
# Windows: installer/portable still built on your PC via scripts/build.ps1
# This workflow publishes GitHub Release patch/full zips for in-app updates.
#
# Required secrets: SUPABASE_URL, SUPABASE_SECRET_KEY, SUPABASE_PUBLISHABLE_KEY, SESSION_SECRET
# Optional: CSC_LINK, CSC_KEY_PASSWORD (Windows code signing)

name: Release (update packages)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.9-beta.1). Leave empty to use package.json version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        id: meta
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              TAG="${{ github.ref_name }}"
            else
              TAG="v${PKG_VERSION}"
            fi
          fi
          case "$TAG" in v*) ;; *) TAG="v${TAG}" ;; esac
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: resolve-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare build environment
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          New-Item -ItemType Directory -Force -Path credentials | Out-Null
          '{}' | Set-Content credentials/service-account.json
          if (-not $env:SESSION_SECRET) { $env:SESSION_SECRET = "ci-release-placeholder-change-in-prod" }
          @"
          DATA_BACKEND=supabase
          SUPABASE_URL=$env:SUPABASE_URL
          SUPABASE_SECRET_KEY=$env:SUPABASE_SECRET_KEY
          SUPABASE_PUBLISHABLE_KEY=$env:SUPABASE_PUBLISHABLE_KEY
          SESSION_SECRET=$env:SESSION_SECRET
          GITHUB_UPDATES_REPO=${{ github.repository }}
          "@ | Set-Content .env

      - run: npm ci
      - run: npm run rebuild:native

      - name: Fetch previous release manifests
        run: node scripts/fetch-release-manifest.js --tag=${{ needs.resolve-tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_UPDATES_REPO: ${{ github.repository }}

      - name: Build portable + unpacked
        shell: pwsh
        env:
          SKIP_CREDENTIALS_CHECK: "1"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: .\scripts\build.ps1 portable

      - name: Package Windows update zips
        run: node scripts/package-github-release.js --full

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/Hangup-HR-*-win-x64*.zip
            dist/update-manifests/win-x64-latest.json
          if-no-files-found: error

  build-macos:
    needs: resolve-tag
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare build environment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          mkdir -p credentials
          echo '{}' > credentials/service-account.json
          if [ -z "$SESSION_SECRET" ]; then SESSION_SECRET="ci-release-placeholder-change-in-prod"; fi
          cat > .env <<EOF
          DATA_BACKEND=supabase
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY
          SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY
          SESSION_SECRET=$SESSION_SECRET
          GITHUB_UPDATES_REPO=${{ github.repository }}
          EOF

      - run: npm ci
      - run: npm run rebuild:native

      - name: Fetch previous release manifests
        run: node scripts/fetch-release-manifest.js --tag=${{ needs.resolve-tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_UPDATES_REPO: ${{ github.repository }}

      - name: Build macOS dmg + zip
        env:
          SKIP_CREDENTIALS_CHECK: "1"
        run: bash scripts/build-macos.sh

      - name: Package macOS update zips
        run: node scripts/package-github-release.js --full

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/Hangup-HR-*-mac-*.zip
            dist/update-manifests/mac-*-latest.json
          if-no-files-found: warn

  publish:
    needs: [resolve-tag, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets
          continue-on-error: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          name: Hangup HR ${{ needs.resolve-tag.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: true
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
