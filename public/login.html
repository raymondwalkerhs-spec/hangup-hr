<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Hangup HR</title>
  <link rel="icon" href="/img/hr-team.png" type="image/png" />
  <script src="/js/theme.js"></script>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <img src="/img/hr-team.png" alt="HR Team Services &amp; Admin" class="login-logo" />
    <p class="brand-tag">Hangup Solutions</p>
    <h1>Hangup HR</h1>
    <p class="tagline">Your command center for Hang-UP Solutions HR, telesales, quality assurance &amp; — one portal for agents, QA, and leadership.</p>
    <p class="made-by muted">Made and maintained by <strong>Mostafa Gomaa</strong></p>
    <p id="app-version-line" class="muted version-line"></p>
    <div id="login-update-banner" class="alert alert-warn hidden" style="margin-bottom:1rem;text-align:left">
      <strong>Update available</strong>
      <p id="login-update-msg" class="muted" style="margin:.35rem 0"></p>
      <button type="button" class="btn btn-sm btn-primary" id="login-update-btn" style="margin-top:.35rem;display:none">Update now</button>
    </div>
    <form id="login-form">
      <label class="field">
        <span>Username</span>
        <input type="text" id="username" name="username" required autocomplete="username" />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </label>
      <label class="remember-row">
        <input type="checkbox" id="remember-user" />
        <span>Remember my username</span>
      </label>
      <label class="remember-row">
        <input type="checkbox" id="remember-password" />
        <span>Save password on this device</span>
      </label>
      <p id="login-error" class="login-error hidden"></p>
      <div id="version-blocked" class="version-blocked hidden">
        <strong>App update required</strong>
        <p id="version-blocked-msg" class="muted"></p>
        <p class="muted">Contact your Admin to install the latest version.</p>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" id="login-btn">Sign in</button>
    </form>
  </div>
  <script>
    const SAVED_USER_KEY = "hr_saved_user";
    const SAVED_PASSWORD_KEY = "hr_saved_password";
    const SESSION_KEY = "hr_session_id";
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const rememberBox = document.getElementById("remember-user");
    const rememberPasswordBox = document.getElementById("remember-password");
    const loginForm = document.getElementById("login-form");
    const loginBtn = document.getElementById("login-btn");
    const err = document.getElementById("login-error");
    const blockedBox = document.getElementById("version-blocked");
    const blockedMsg = document.getElementById("version-blocked-msg");

    let loginPermanentlyBlocked = false;

    function setLoginBlocked(message) {
      loginPermanentlyBlocked = true;
      err.classList.add("hidden");
      blockedBox.classList.remove("hidden");
      blockedMsg.textContent = message || "This app version is no longer supported.";
      loginBtn.disabled = true;
      loginForm.querySelectorAll("input").forEach((el) => {
        el.disabled = true;
      });
    }

    async function loadVersionInfo() {
      try {
        const res = await fetch("/api/version-info");
        const data = await res.json();
        const line = document.getElementById("app-version-line");
        if (line && data.appVersion) {
          line.textContent = `App version ${data.appVersion}`;
        }
        if (data.versionCheck?.status === "blocked") {
          setLoginBlocked(data.versionCheck.message);
          return;
        }
        const githubInfo =
          data.githubUpdate ||
          (await fetch("/api/github-update").then((r) => (r.ok ? r.json() : null)).catch(() => null));
        if (githubInfo?.enabled && githubInfo.updateAvailable) {
          const banner = document.getElementById("login-update-banner");
          const msg = document.getElementById("login-update-msg");
          const btn = document.getElementById("login-update-btn");
          if (banner && msg) {
            banner.classList.remove("hidden");
            msg.textContent = `Version ${githubInfo.latest} is on GitHub (you have ${githubInfo.current || data.appVersion}). Sign in to update in-app, or install the latest build.`;
          }
          if (btn && window.hrDesktop?.applyGitHubUpdate) {
            btn.style.display = "inline-block";
            btn.onclick = async () => {
              btn.disabled = true;
              btn.textContent = "Downloading…";
              try {
                await window.hrDesktop.applyGitHubUpdate();
                btn.textContent = "Restarting…";
                setTimeout(() => window.hrDesktop.relaunchApp?.(), 800);
              } catch (e) {
                btn.disabled = false;
                btn.textContent = "Update now";
                alert(e.message || "Update failed");
              }
            };
          }
        }
      } catch (_) {}
    }

    loadVersionInfo();

    // Prefill remembered username/password on this device.
    try {
      const savedUser = localStorage.getItem(SAVED_USER_KEY);
      const savedPassword = localStorage.getItem(SAVED_PASSWORD_KEY);
      if (savedUser) {
        usernameInput.value = savedUser;
        rememberBox.checked = true;
      }
      if (savedPassword) {
        try {
          passwordInput.value = atob(savedPassword);
          rememberPasswordBox.checked = true;
        } catch (_) {}
      }
      if (savedUser) passwordInput.focus();
    } catch (_) {}

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("login-error");
      const btn = document.getElementById("login-btn");
      err.classList.add("hidden");
      btn.classList.add("is-loading");
      btn.disabled = true;
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (data.versionBlocked) {
          setLoginBlocked(data.versionCheck?.message || data.error);
          return;
        }
        if (data.terminated && window.hrDesktop) {
          await window.hrDesktop.triggerUninstall();
          return;
        }
        if (!res.ok) throw new Error(data.error || "Login failed");
        // Save username/password locally when opted in (device-only).
        try {
          if (rememberBox.checked) localStorage.setItem(SAVED_USER_KEY, username);
          else localStorage.removeItem(SAVED_USER_KEY);
          if (rememberPasswordBox.checked) localStorage.setItem(SAVED_PASSWORD_KEY, btoa(password));
          else localStorage.removeItem(SAVED_PASSWORD_KEY);
        } catch (_) {}
        try {
          sessionStorage.setItem(SESSION_KEY, data.sessionId);
        } catch (_) {}
        if (window.hrDesktop) await window.hrDesktop.setSession(data.sessionId);
        try {
          sessionStorage.setItem("hr_check_app_update", "1");
        } catch (_) {}
        if (data.versionNotice) {
          try {
            sessionStorage.setItem(
              "hr_pending_version_notice",
              JSON.stringify(data.versionNotice)
            );
          } catch (_) {}
        }
        window.location.href = "/";
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove("hidden");
      } finally {
        btn.classList.remove("is-loading");
        if (!loginPermanentlyBlocked) btn.disabled = false;
      }
    });
  </script>
</body>
</html>
